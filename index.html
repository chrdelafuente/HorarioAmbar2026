<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8° Ambar | Horario Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg-page: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        /* Paleta de Alto Contraste */
        .cat-humanidades { border-left: 6px solid #be123c; background: #fff1f2; }
        .cat-ciencias { border-left: 6px solid #047857; background: #ecfdf5; }
        .cat-exactas { border-left: 6px solid #1d4ed8; background: #eff6ff; }
        .cat-artes { border-left: 6px solid #b45309; background: #fffbeb; }
        .cat-deporte { border-left: 6px solid #0369a1; background: #f0f9ff; }
        .cat-tecnica { border-left: 6px solid #334155; background: #f8fafc; }
        .cat-orientacion { border-left: 6px solid #a21caf; background: #fdf4ff; }
        
        .lunch-card { border-left: 6px solid #c2410c; background: #fff7ed; }
        .break-row { background: #cbd5e1; color: #1e293b; border: 1px solid #94a3b8; }

        .subject-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-top: 1px solid rgba(0,0,0,0.05);
            border-right: 1px solid rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Resaltado Crítico Bloque Activo */
        .active-cell {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.4), 0 0 0 4px #000;
            z-index: 50;
            background: #fff !important;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.4), 0 0 0 4px #000; }
            50% { box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.2), 0 0 0 6px var(--primary); }
            100% { box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.4), 0 0 0 4px #000; }
        }

        .active-cell::after {
            content: 'ACTUAL';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            z-index: 60;
        }

        /* Tooltip Minimalista */
        .custom-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #000;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .subject-card:hover .custom-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .highlight-search { border: 3px solid #000 !important; transform: scale(1.02); z-index: 40; }
        .dim-search { opacity: 0.15; filter: grayscale(1); }

        .merge-top { border-top: 0 !important; border-top-left-radius: 0 !important; border-top-right-radius: 0 !important; }
        .merge-bottom { border-bottom: 0 !important; border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; }

        .progress-ring__circle { transition: stroke-dashoffset 0.5s; transform: rotate(-90deg); transform-origin: 50% 50%; }

        @media print { 
            .no-pdf { display: none !important; }
            .active-cell { transform: none; box-shadow: none; animation: none; border: 2px solid #000 !important; }
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="max-w-[1440px] mx-auto px-4 py-6 md:py-8">
        
        <!-- Dashboard Header -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <header class="lg:col-span-5 bg-white p-6 rounded-[2rem] shadow-xl flex items-center justify-between border-b-8 border-indigo-600">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-black tracking-tighter text-slate-900 leading-none">8° Ambar</h1>
                        <p id="header-date" class="text-indigo-600 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Cargando...</p>
                    </div>
                </div>
                <button onclick="downloadPDF()" class="no-pdf p-4 bg-slate-900 text-white rounded-2xl hover:bg-black transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="3"></path></svg>
                </button>
            </header>

            <div class="lg:col-span-4 bg-white p-6 rounded-[2rem] shadow-xl flex items-center justify-between border-b-8 border-indigo-500">
                <div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Termino de Bloque</span>
                    <span id="time-left" class="text-4xl font-black tabular-nums text-slate-900 leading-none tracking-tighter">--:--</span>
                    <div class="flex items-center gap-2 mt-2">
                        <span id="current-time" class="text-xs font-black text-indigo-600 tabular-nums">00:00</span>
                        <span id="status-label" class="text-[9px] font-black text-slate-400 uppercase ml-2">---</span>
                    </div>
                </div>
                <div class="relative w-20 h-20">
                    <svg class="progress-ring" width="80" height="80">
                        <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="32" cx="40" cy="40"/>
                        <circle id="progress-circle" class="progress-ring__circle text-indigo-600" stroke-width="8" stroke-dasharray="201.06" stroke-dashoffset="201.06" stroke-linecap="round" stroke="currentColor" fill="transparent" r="32" cx="40" cy="40"/>
                    </svg>
                    <div id="progress-text" class="absolute inset-0 flex items-center justify-center text-xs font-black">0%</div>
                </div>
            </div>

            <div id="next-class-panel" class="lg:col-span-3 bg-slate-900 p-6 rounded-[2rem] shadow-xl flex items-center justify-between text-white overflow-hidden">
                <div class="z-10">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 block">Próximo</span>
                    <h2 id="next-subject-name" class="text-xl font-black tracking-tight truncate w-32 uppercase">---</h2>
                    <p id="next-subject-time" class="text-[9px] font-bold text-slate-400 uppercase mt-1">---</p>
                </div>
                <div id="next-subject-icon" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center font-black border border-white/10 uppercase">--</div>
            </div>
        </div>

        <!-- Tool Bar -->
        <div class="flex flex-col md:flex-row gap-4 mb-8 no-pdf">
            <div class="relative flex-1">
                <input type="text" id="search-input" placeholder="Filtrar por ramo o docente..." class="w-full bg-white border-4 border-slate-100 p-4 pl-12 rounded-2xl text-sm font-bold shadow-sm focus:border-indigo-600 outline-none transition-all">
                <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3"></path></svg>
            </div>
            <nav class="md:hidden flex gap-1.5 overflow-x-auto pb-2 hide-scrollbar">
                <button onclick="switchDay(1)" class="day-tab px-6 py-4 rounded-2xl text-[10px] font-black bg-white border-2 border-slate-100 text-slate-400" data-day="1">LUN</button>
                <button onclick="switchDay(2)" class="day-tab px-6 py-4 rounded-2xl text-[10px] font-black bg-white border-2 border-slate-100 text-slate-400" data-day="2">MAR</button>
                <button onclick="switchDay(3)" class="day-tab px-6 py-4 rounded-2xl text-[10px] font-black bg-white border-2 border-slate-100 text-slate-400" data-day="3">MIE</button>
                <button onclick="switchDay(4)" class="day-tab px-6 py-4 rounded-2xl text-[10px] font-black bg-white border-2 border-slate-200 text-slate-400" data-day="4">JUE</button>
                <button onclick="switchDay(5)" class="day-tab px-6 py-4 rounded-2xl text-[10px] font-black bg-white border-2 border-slate-200 text-slate-400" data-day="5">VIE</button>
            </nav>
        </div>

        <!-- Timetable Grid -->
        <div id="pdf-grid" class="bg-white p-3 md:p-8 rounded-[3rem] shadow-2xl border border-slate-200">
            <div class="min-w-full">
                <div class="hidden md:grid grid-cols-12 gap-5 mb-8 px-4">
                    <div class="col-span-1"></div>
                    <div class="col-span-11 grid grid-cols-5 gap-5">
                        <div class="text-center font-black text-[11px] text-slate-300 uppercase tracking-[0.6em]">Lunes</div>
                        <div class="text-center font-black text-[11px] text-slate-300 uppercase tracking-[0.6em]">Martes</div>
                        <div class="text-center font-black text-[11px] text-slate-300 uppercase tracking-[0.6em]">Miércoles</div>
                        <div class="text-center font-black text-[11px] text-slate-300 uppercase tracking-[0.6em]">Jueves</div>
                        <div class="text-center font-black text-[11px] text-slate-300 uppercase tracking-[0.6em]">Viernes</div>
                    </div>
                </div>
                <div id="timetable-content" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Security node for script checks -->
    <div id="status-ping" class="hidden"></div>

    <script>
        const subjectsData = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'Prof. Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'Prof. Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'Prof. Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'Prof. Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'Prof. Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'Prof. Higuera', cat: 'cat-humanidades' },
            'CSN': { name: 'Ciencias Naturales', teacher: 'Contreras/Sazo/Flores', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'Prof. Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'Prof. Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'Prof. Villarreal', cat: 'cat-humanidades' },
            'TAL': { name: 'Refuerzo Pedagógico', teacher: 'V. Riquelme / J. Yañez', cat: 'cat-tecnica' },
            'TEC': { name: 'Educación Tecnológica', teacher: 'Prof. Vargas', cat: 'cat-tecnica' },
            'MUS': { name: 'Educación Musical', teacher: 'Prof. Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "TAL", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "RECREO" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CSN", "ING", "MTM", "CSN"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CSN", "OC", "MTM", "CSN"] },
            { type: 'break', time: ["11:30", "11:45"], label: "RECREO" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CSN", "TAL", "TEC"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CSN", "ART", "MUS"] },
            { type: 'period', id: 7, time: ["13:15", "14:00"], data: ["ALM", "ALM", "ALM", "ALM", "MUS"] },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 9, time: ["14:45", "15:30"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:30", "16:15"], data: ["-", "OC", "-", "-", "-"] }
        ];

        let currentActiveDay = new Date().getDay() || 1;
        if (currentActiveDay > 5) currentActiveDay = 1;
        let lastKnownIdx = -1;
        let searchQuery = "";

        function renderTimetable() {
            const container = document.getElementById('timetable-content');
            if(!container) return;
            const isMobile = window.innerWidth < 768;
            const now = new Date();
            const currentDay = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            
            container.innerHTML = '';

            schedule.forEach((item, rowIndex) => {
                const startNum = parseInt(item.time[0].replace(':', ''));
                const endNum = parseInt(item.time[1].replace(':', ''));
                const isCurrent = currentHHMM >= startNum && currentHHMM < endNum;

                if (item.type === 'break') {
                    const row = document.createElement('div');
                    row.className = `grid grid-cols-12 gap-3 items-center h-10 break-row rounded-2xl px-4 transition-all duration-500 ${isCurrent && currentDay >= 1 && currentDay <= 5 ? 'bg-indigo-600 text-white border-indigo-700' : ''}`;
                    row.innerHTML = `
                        <div class="col-span-2 md:col-span-1 text-right text-[10px] font-black tabular-nums opacity-60">${item.time[0]}</div>
                        <div class="col-span-10 md:col-span-11 text-center text-[11px] font-black uppercase tracking-[0.8em]">${item.label}</div>
                    `;
                    container.appendChild(row);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-3 md:gap-5 h-24 items-stretch';
                
                const timeCol = document.createElement('div');
                timeCol.className = `col-span-2 md:col-span-1 flex flex-col justify-center text-right pr-4 border-r-4 ${isCurrent ? 'border-indigo-600 text-indigo-600' : 'border-slate-100 text-slate-300'}`;
                timeCol.innerHTML = `
                    <span class="font-black text-[10px] mb-1 opacity-50 uppercase tracking-tighter">B-${item.id}</span>
                    <span class="font-black text-xs md:text-xl leading-none tabular-nums">${item.time[0]}</span>
                    <span class="font-bold text-[10px] opacity-40 tabular-nums mt-1">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = 'col-span-10 md:col-span-11 grid grid-cols-1 md:grid-cols-5 gap-3 md:gap-5';

                item.data.forEach((code, colIndex) => {
                    const isToday = (colIndex + 1) === currentDay;
                    const isActive = isToday && isCurrent;
                    if (isMobile && (colIndex + 1) !== currentActiveDay) return;

                    const block = document.createElement('div');
                    
                    if (code === "-") {
                        block.className = 'bg-slate-50/50 rounded-[2.5rem] border-2 border-dashed border-slate-200 h-full';
                    } else if (code === "ALM") {
                        block.className = `lunch-card rounded-[2.5rem] flex flex-col items-center justify-center h-full shadow-sm border ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `<span class="text-[10px] font-black uppercase tracking-widest text-orange-800">Almuerzo</span>`;
                    } else {
                        const info = subjectsData[code];
                        const prev = schedule[rowIndex - 1];
                        const next = schedule[rowIndex + 1];
                        let mergeClass = "";
                        if (prev && prev.type === 'period' && prev.data[colIndex] === code) mergeClass += " merge-top";
                        if (next && next.type === 'period' && next.data[colIndex] === code) mergeClass += " merge-bottom";

                        const isSearchMatch = searchQuery !== "" && (code.toLowerCase().includes(searchQuery) || info.name.toLowerCase().includes(searchQuery));
                        const searchStyle = searchQuery !== "" ? (isSearchMatch ? "highlight-search" : "dim-search") : "";

                        block.className = `subject-card group ${info.cat} ${mergeClass} ${searchStyle} p-4 rounded-[2.5rem] border border-slate-200 flex flex-col justify-center items-center text-center h-full ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `
                            <div class="custom-tooltip">${info.name}</div>
                            <span class="text-slate-900 font-black text-sm md:text-3xl leading-none mb-1.5 tracking-tighter">${code}</span>
                            <span class="text-slate-500 font-black text-[11px] uppercase tracking-tighter truncate w-full">${info.teacher.split(' ').pop()}</span>
                        `;
                    }
                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function setProgress(percent) {
            const circle = document.getElementById('progress-circle');
            if(!circle) return;
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            circle.style.strokeDashoffset = circumference - (percent / 100 * circumference);
            const pText = document.getElementById('progress-text');
            if(pText) pText.textContent = Math.round(percent) + '%';
        }

        function switchDay(day) {
            currentActiveDay = day;
            document.querySelectorAll('.day-tab').forEach(t => {
                t.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-lg');
                t.classList.add('bg-white', 'text-slate-400');
                if (parseInt(t.dataset.day) === day) {
                    t.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-lg');
                    t.classList.remove('bg-white', 'text-slate-400');
                }
            });
            renderTimetable();
        }

        function updateStatus() {
            const now = new Date();
            const day = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            const isWeekDay = day >= 1 && day <= 5;
            
            const daysArr = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
            const hDate = document.getElementById('header-date');
            if(hDate) hDate.textContent = `${daysArr[day]}, ${now.getDate()} DE ABRIL`;
            
            const tDisplay = document.getElementById('current-time');
            if(tDisplay) tDisplay.textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });

            let sLabel = "FUERA DE HORARIO";
            let activeIdx = -1;
            let progress = 0;
            let tLeft = "--:--";

            if (isWeekDay) {
                const activeItem = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (currentHHMM >= start && currentHHMM < end) {
                        activeIdx = idx;
                        const [sH, sM] = s.time[0].split(':').map(Number);
                        const [eH, eM] = s.time[1].split(':').map(Number);
                        const sTot = sH * 60 + sM;
                        const eTot = eH * 60 + eM;
                        const nTot = now.getHours() * 60 + now.getMinutes();
                        progress = Math.max(0, Math.min(100, ((nTot - sTot) / (eTot - sTot)) * 100));
                        const dSec = (eTot - nTot) * 60 - now.getSeconds();
                        tLeft = `${Math.floor(dSec / 60)}:${(dSec % 60).toString().padStart(2, '0')}`;
                        return true;
                    }
                    return false;
                });

                if (activeItem) {
                    sLabel = activeItem.type === 'break' ? "RECREO" : "CLASE";
                    let nIdx = activeIdx + 1;
                    while(nIdx < schedule.length && schedule[nIdx].type === 'break') nIdx++;
                    if(nIdx < schedule.length) {
                        const next = schedule[nIdx];
                        const code = next.data[day-1];
                        const nsN = document.getElementById('next-subject-name');
                        const nsT = document.getElementById('next-subject-time');
                        const nsI = document.getElementById('next-subject-icon');
                        if(code && code !== "-") {
                            const info = subjectsData[code] || { name: code };
                            if(nsN) nsN.textContent = info.name;
                            if(nsT) nsT.textContent = `A LAS ${next.time[0]}`;
                            if(nsI) nsI.textContent = code.substring(0,2);
                        } else {
                            if(nsN) nsN.textContent = "FIN";
                        }
                    }
                } else {
                    const nsN = document.getElementById('next-subject-name');
                    if(nsN) nsN.textContent = "HASTA MAÑANA";
                }
            }

            const sl = document.getElementById('status-label');
            if(sl) sl.textContent = sLabel;
            const tl = document.getElementById('time-left');
            if(tl) tl.textContent = tLeft;
            
            setProgress(progress);

            if (activeIdx !== lastKnownIdx) {
                lastKnownIdx = activeIdx;
                renderTimetable();
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderTimetable();
        });

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const opt = {
                margin: 0.1,
                filename: '8A_Ambar_Horario_Master.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#f1f5f9' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        window.addEventListener('resize', renderTimetable);
        updateStatus();
        switchDay(currentActiveDay);
        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
