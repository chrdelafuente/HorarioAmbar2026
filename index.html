<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario 8° Ambar | Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #fcfcfd;
            --accent: #4f46e5;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .subject-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-left-width: 5px;
            position: relative;
        }
        @media (min-width: 768px) {
            .subject-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.1);
                z-index: 50;
            }
        }
        .cat-humanidades { border-left-color: #ef4444; background: linear-gradient(to right, #fef2f2, #ffffff); }
        .cat-ciencias { border-left-color: #10b981; background: linear-gradient(to right, #ecfdf5, #ffffff); }
        .cat-exactas { border-left-color: #3b82f6; background: linear-gradient(to right, #eff6ff, #ffffff); }
        .cat-artes { border-left-color: #f59e0b; background: linear-gradient(to right, #fffbeb, #ffffff); }
        .cat-deporte { border-left-color: #8b5cf6; background: linear-gradient(to right, #f5f3ff, #ffffff); }
        .cat-tecnica { border-left-color: #64748b; background: linear-gradient(to right, #f8fafc, #ffffff); }
        .cat-orientacion { border-left-color: #ec4899; background: linear-gradient(to right, #fdf2f8, #ffffff); }
        
        .active-block {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            background: #ffffff !important;
        }

        .active-time-marker {
            background-color: var(--accent);
            color: white;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .custom-tooltip {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 100;
            width: 16rem;
            backdrop-filter: blur(8px);
        }

        .tooltip-center { left: 50%; transform: translateX(-50%); }
        .tooltip-right { right: 0; left: auto; transform: none; }
        .tooltip-left { left: 0; transform: none; }
        .tooltip-down { top: 115%; }
        .tooltip-up { bottom: 115%; }

        @media (min-width: 768px) {
            .subject-card:hover .custom-tooltip { opacity: 1; }
        }

        .break-row-ui { 
            background: repeating-linear-gradient(45deg, #fef9c3, #fef9c3 10px, #fefce8 10px, #fefce8 20px);
            color: #854d0e; 
            border: 1px solid #fef08a;
        }
        
        .lunch-card-ui {
            background: #fff7ed;
            color: #c2410c;
            border: 1px dashed #fdba74;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .merge-top { border-top-left-radius: 0 !important; border-top-right-radius: 0 !important; border-top: 0 !important; }
        .merge-bottom { border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; border-bottom: 0 !important; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="w-full px-4 py-6 md:px-10 md:py-10">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <div class="flex items-center gap-5">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-indigo-200 shadow-lg">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <div class="flex items-center gap-3">
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">8° Ambar</h1>
                        <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold tracking-widest">PERIODO 2026</span>
                    </div>
                    <p class="text-slate-400 text-sm font-medium mt-1 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Fundación Educar para la Vida
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 w-full lg:w-auto">
                <div id="status-container" class="flex-1 lg:flex-none flex items-center gap-4 bg-slate-50 px-5 py-3 rounded-2xl border border-slate-100 transition-all duration-500">
                    <div class="relative flex items-center justify-center">
                        <div id="status-dot" class="w-3 h-3 bg-slate-300 rounded-full"></div>
                        <div id="status-ping" class="absolute w-full h-full bg-slate-300 rounded-full animate-ping opacity-75 hidden"></div>
                    </div>
                    <div class="flex flex-col">
                        <p id="current-time" class="text-2xl font-black text-slate-900 tabular-nums tracking-tight leading-none">00:00</p>
                        <p id="current-info" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">Sincronizando</p>
                    </div>
                </div>
                <button onclick="downloadPDF()" class="no-pdf bg-slate-900 hover:bg-black text-white p-4 rounded-2xl transition-all shadow-xl shadow-slate-200 group">
                    <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </header>

        <nav class="md:hidden flex gap-2 mb-6 overflow-x-auto no-pdf pb-2 scroll-smooth hide-scrollbar">
            <button onclick="switchDay(1)" class="day-tab flex-1 min-w-[80px] px-4 py-3 rounded-2xl text-sm font-bold bg-white border border-slate-100 text-slate-500" data-day="1">Lun</button>
            <button onclick="switchDay(2)" class="day-tab flex-1 min-w-[80px] px-4 py-3 rounded-2xl text-sm font-bold bg-white border border-slate-100 text-slate-500" data-day="2">Mar</button>
            <button onclick="switchDay(3)" class="day-tab flex-1 min-w-[80px] px-4 py-3 rounded-2xl text-sm font-bold bg-white border border-slate-100 text-slate-500" data-day="3">Mié</button>
            <button onclick="switchDay(4)" class="day-tab flex-1 min-w-[80px] px-4 py-3 rounded-2xl text-sm font-bold bg-white border border-slate-100 text-slate-500" data-day="4">Jue</button>
            <button onclick="switchDay(5)" class="day-tab flex-1 min-w-[80px] px-4 py-3 rounded-2xl text-sm font-bold bg-white border border-slate-100 text-slate-500" data-day="5">Vie</button>
        </nav>

        <div id="pdf-grid" class="bg-white p-3 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 overflow-visible">
            <div class="min-w-full">
                <div class="hidden md:grid grid-cols-12 gap-6 mb-6 font-extrabold text-[11px] uppercase tracking-[0.2em] text-slate-400 px-4">
                    <div class="col-span-1 text-center">Hora</div>
                    <div class="col-span-11 grid grid-cols-5 gap-6">
                        <div class="text-center">Lunes</div>
                        <div class="text-center">Martes</div>
                        <div class="text-center">Miércoles</div>
                        <div class="text-center">Jueves</div>
                        <div class="text-center">Viernes</div>
                    </div>
                </div>
                <div id="timetable-content" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const subjects = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'Prof. Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'Prof. Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'Prof. Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'Prof. Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'Prof. Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'Prof. Higuera', cat: 'cat-humanidades' },
            'CS NAT': { name: 'Ciencias Naturales', teacher: 'Sazo / Flores / Contreras', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'Prof. Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'Prof. Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'Prof. Villarreal', cat: 'cat-humanidades' },
            'Taller Pedagogo': { name: 'Refuerzo Pedagógico', teacher: 'V. Riquelme / J. Yañez', cat: 'cat-tecnica' },
            'TEC N': { name: 'Educación Tecnológica', teacher: 'Prof. Vargas', cat: 'cat-tecnica' },
            'MÚS': { name: 'Educación Musical', teacher: 'Prof. Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "Taller Pedagogo", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "Recreo Intermedio" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CS NAT", "ING", "MTM", "CS NAT"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CS NAT", "OC", "MTM", "CS NAT"] },
            { type: 'break', time: ["11:30", "11:45"], label: "Recreo Intermedio" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CS NAT", "Taller Pedagogo", "TEC N"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CS NAT", "ART", "MÚS"] },
            { type: 'period', id: 7, time: ["13:15", "14:00"], data: ["ALM", "ALM", "ALM", "ALM", "MÚS"] },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "MÚS"] },
            { type: 'break', time: ["14:45", "14:55"], label: "Pausa Corta" },
            { type: 'period', id: 9, time: ["14:55", "15:40"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:40", "16:25"], data: ["-", "OC", "-", "-", "-"] },
            { type: 'period', id: 11, time: ["16:25", "17:10"], data: ["-", "-", "-", "-", "-"] }
        ];

        let currentActiveDay = new Date().getDay() || 1; 
        if (currentActiveDay > 5) currentActiveDay = 1;
        let lastKnownActiveIndex = -1;

        function renderTimetable() {
            const container = document.getElementById('timetable-content');
            const isMobile = window.innerWidth < 768;
            const now = new Date();
            const currentDay = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            
            container.innerHTML = '';

            schedule.forEach((item, rowIndex) => {
                const startTime = parseInt(item.time[0].replace(':', ''));
                const endTime = parseInt(item.time[1].replace(':', ''));
                const isCurrentTimeSlot = currentHHMM >= startTime && currentHHMM < endTime;

                if (item.type === 'break') {
                    const el = document.createElement('div');
                    const isActiveBreak = isCurrentTimeSlot && (currentDay >= 1 && currentDay <= 5);
                    el.className = `grid grid-cols-12 gap-2 md:gap-6 items-center h-10 break-row-ui rounded-2xl px-4 ${isActiveBreak ? 'active-break' : ''}`;
                    el.innerHTML = `
                        <div class="col-span-2 md:col-span-1 text-right text-[10px] font-black opacity-50 tabular-nums">${item.time[0]}</div>
                        <div class="col-span-10 md:col-span-11 text-center text-[10px] font-black uppercase tracking-[0.3em]">${item.label}</div>
                    `;
                    container.appendChild(el);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-2 md:gap-6 h-24 items-stretch';
                
                const timeCol = document.createElement('div');
                timeCol.className = 'col-span-2 md:col-span-1 flex flex-col justify-center text-right pr-4 border-r border-slate-100';
                timeCol.innerHTML = `
                    <span class="text-slate-300 font-bold text-[10px] mb-1">#${item.id}</span>
                    <span class="text-slate-900 font-black text-sm md:text-base ${isCurrentTimeSlot ? 'active-time-marker' : ''}">${item.time[0]}</span>
                    <span class="text-slate-400 font-bold text-[10px] mt-1">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = 'col-span-10 md:col-span-11 grid grid-cols-1 md:grid-cols-5 gap-2 md:gap-6';

                item.data.forEach((code, colIndex) => {
                    const isToday = (colIndex + 1) === currentDay;
                    const isActiveSubject = isToday && isCurrentTimeSlot;

                    if (isMobile && (colIndex + 1) !== currentActiveDay) return;

                    const block = document.createElement('div');
                    if (code === "-") {
                        block.className = 'bg-slate-50/50 rounded-3xl border-2 border-dashed border-slate-100 h-full';
                    } else if (code === "ALM") {
                        block.className = `lunch-card-ui rounded-3xl h-full shadow-sm ${isActiveSubject ? 'active-block' : ''}`;
                        block.innerHTML = `
                            <svg class="w-5 h-5 mr-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 2L12 22M2 12L22 12M5 5L19 19M5 19L19 5" stroke-width="2"></path></svg>
                            <span class="text-[10px] md:text-xs">Almuerzo</span>
                        `;
                    } else {
                        const info = subjects[code];
                        const prev = schedule[rowIndex - 1];
                        const next = schedule[rowIndex + 1];
                        let merge = "";
                        if (prev && prev.type === 'period' && prev.data[colIndex] === code) merge += " merge-top";
                        if (next && next.type === 'period' && next.data[colIndex] === code) merge += " merge-bottom";

                        const vPos = rowIndex < 8 ? 'tooltip-down' : 'tooltip-up';
                        let hPos = 'tooltip-center';
                        if (colIndex === 0) hPos = 'tooltip-left';
                        if (colIndex === 4) hPos = 'tooltip-right';

                        block.className = `subject-card ${info.cat} ${merge} p-4 rounded-3xl border border-slate-100/50 shadow-sm flex flex-col justify-center items-center text-center h-full ${isActiveSubject ? 'active-block' : ''}`;
                        block.innerHTML = `
                            <div class="custom-tooltip ${vPos} ${hPos} bg-slate-900/95 text-white p-5 rounded-[1.5rem] border border-white/10 no-pdf">
                                <p class="font-extrabold text-xs text-indigo-300 mb-2 uppercase tracking-widest">${info.name}</p>
                                <div class="flex items-center justify-center gap-2 text-[10px] font-bold text-slate-300 uppercase">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                    ${info.teacher}
                                </div>
                            </div>
                            <span class="text-slate-900 font-extrabold text-sm md:text-base leading-none mb-1.5 tracking-tight">${code}</span>
                            <span class="text-slate-500 font-bold text-[9px] md:text-[10px] uppercase truncate w-full opacity-60">${info.teacher.split(' ').pop()}</span>
                        `;
                    }
                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function switchDay(day) {
            currentActiveDay = day;
            document.querySelectorAll('.day-tab').forEach(t => {
                t.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-100');
                t.classList.add('bg-white', 'text-slate-500');
                if (parseInt(t.dataset.day) === day) {
                    t.classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-100');
                    t.classList.remove('bg-white', 'text-slate-500');
                }
            });
            renderTimetable();
        }

        function updateStatus() {
            const now = new Date();
            const day = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            const dailyClosing = { 1: 1540, 2: 1625, 3: 1540, 4: 1540, 5: 1445 };
            const isWeekDay = day >= 1 && day <= 5;
            
            document.getElementById('current-time').textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            const infoText = document.getElementById('current-info');
            const dot = document.getElementById('status-dot');
            const ping = document.getElementById('status-ping');

            let statusStr = "Fuera de Horario";
            let dotColor = "bg-slate-300";
            let activeIdx = -1;

            if (isWeekDay && currentHHMM >= 815 && currentHHMM <= (dailyClosing[day] || 0)) {
                const activeItem = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (currentHHMM >= start && currentHHMM < end) {
                        activeIdx = idx;
                        return true;
                    }
                    return false;
                });

                if (activeItem) {
                    if (activeItem.type === 'break') {
                        statusStr = "En Recreo";
                        dotColor = "bg-amber-500";
                    } else if (activeItem.type === 'period' && activeItem.data[day-1] === "ALM") {
                        statusStr = "Hora de Almuerzo";
                        dotColor = "bg-orange-500";
                    } else {
                        statusStr = "Clase en Curso";
                        dotColor = "bg-emerald-500";
                    }
                }
                ping.classList.remove('hidden');
            } else {
                ping.classList.add('hidden');
            }

            infoText.textContent = statusStr;
            dot.className = `w-3 h-3 ${dotColor} rounded-full transition-colors duration-500`;
            ping.className = `absolute w-full h-full ${dotColor} rounded-full animate-ping opacity-75`;

            if (activeIdx !== lastKnownActiveIndex) {
                lastKnownActiveIndex = activeIdx;
                renderTimetable();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const originalDay = currentActiveDay;
            const isMobile = window.innerWidth < 768;

            if (isMobile) {
                const container = document.getElementById('timetable-content');
                container.innerHTML = '';
                schedule.forEach((item) => {
                    if (item.type === 'break') {
                        const el = document.createElement('div');
                        el.className = `grid grid-cols-12 gap-1 items-center h-6 break-row-ui rounded mb-1`;
                        el.innerHTML = `<div class="col-span-2 text-center text-[7px] font-black">${item.time[0]}</div><div class="col-span-10 text-center text-[7px] font-black uppercase">${item.label}</div>`;
                        container.appendChild(el);
                        return;
                    }
                    const row = document.createElement('div');
                    row.className = 'grid grid-cols-12 gap-1 h-14 items-stretch';
                    const timeCol = document.createElement('div');
                    timeCol.className = 'col-span-1 flex flex-col justify-center text-center border-r border-slate-100';
                    timeCol.innerHTML = `<span class="text-[7px] font-black">${item.time[0]}</span>`;
                    row.appendChild(timeCol);
                    const grid = document.createElement('div');
                    grid.className = 'col-span-11 grid grid-cols-5 gap-1 h-full';
                    item.data.forEach((code) => {
                        const block = document.createElement('div');
                        if (code === "-") block.className = 'bg-slate-50 border border-dashed border-slate-100';
                        else if (code === "ALM") {
                            block.className = `lunch-card-ui bg-white rounded border border-slate-100 flex flex-col justify-center items-center text-center h-full`;
                            block.innerHTML = `<span class="text-[6px] font-black">ALM</span>`;
                        } else {
                            const info = subjects[code];
                            block.className = `subject-card ${info.cat} bg-white rounded border border-slate-100 flex flex-col justify-center items-center text-center h-full`;
                            block.innerHTML = `<span class="text-slate-900 font-black text-[8px] leading-none">${code}</span>`;
                        }
                        grid.appendChild(block);
                    });
                    row.appendChild(grid);
                    container.appendChild(row);
                });
            }

            const opt = {
                margin: 0.1,
                filename: 'Horario_8A_Ambar_Elite.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if (isMobile) switchDay(originalDay);
                else renderTimetable();
            });
        }

        window.addEventListener('resize', renderTimetable);
        updateStatus();
        switchDay(currentActiveDay);
        setInterval(updateStatus, 15000);
    </script>
</body>
</html>
