<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8° A Ámbar | Dashboard Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-page: #f0f4f8;
            --text-main: #1e293b;
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Categorías Pastel - Mapeo image_5f30aa.png */
        .cat-humanidades { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .cat-exactas { background-color: #dbeafe; border-left: 4px solid #3b82f6; }
        .cat-ciencias { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .cat-artes { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        .cat-deporte { background-color: #f3e8ff; border-left: 4px solid #8b5cf6; }
        .cat-tecnica { background-color: #f1f5f9; border-left: 4px solid #64748b; }
        .cat-orientacion { background-color: #fae8ff; border-left: 4px solid #d946ef; }

        .lunch-card { background-color: #fff7ed; border: 1px dashed #f97316; }
        .break-row { background-color: #e2e8f0; color: #475569; }

        .subject-pill {
            border-radius: 1.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Resaltado de Bloque Activo */
        .active-cell {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
            z-index: 30;
            background-color: white !important;
        }

        .active-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0f172a;
            color: white;
            font-size: 7px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .highlight-search {
            transform: scale(1.05);
            box-shadow: 0 0 0 4px #0f172a !important;
            z-index: 40;
        }

        .dim-search { opacity: 0.2; filter: grayscale(1); }

        .dash-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dash-card-dark { background: #0f172a; color: white; }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .custom-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #0f172a;
            color: white;
            padding: 6px 12px;
            border-radius: 0.75rem;
            font-size: 9px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .subject-pill:hover .custom-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        @media (max-width: 768px) {
            .subject-pill { border-radius: 1rem; padding: 0.75rem !important; }
            .active-label { top: -8px; font-size: 6px; }
            .dash-card { padding: 1rem !important; }
        }

        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body class="min-h-screen p-3 md:p-8">
    <div class="max-w-[1400px] mx-auto">
        
        <!-- Dashboard Status Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 mb-6 md:mb-8">
            <div class="dash-card p-6 flex items-center justify-between relative overflow-hidden">
                <div class="flex items-center gap-3 md:gap-5 z-10">
                    <div class="w-12 h-12 md:w-14 md:h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <svg class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-xl md:text-2xl font-black tracking-tighter text-slate-900">8° Ambar</h2>
                        <p id="header-date" class="text-indigo-600 text-[9px] md:text-[10px] font-black uppercase tracking-widest mt-1">Cargando...</p>
                    </div>
                </div>
                <button onclick="downloadPDF()" class="no-pdf w-10 h-10 md:w-12 md:h-12 bg-slate-900 text-white rounded-xl md:rounded-2xl flex items-center justify-center hover:bg-black transition-colors z-10">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2.5"></path></svg>
                </button>
            </div>

            <div class="dash-card p-6 flex items-center justify-between">
                <div>
                    <span class="text-[8px] md:text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Término de Bloque</span>
                    <span id="time-left" class="text-3xl md:text-4xl font-black tabular-nums tracking-tighter text-slate-900 leading-none">--:--</span>
                    <div class="flex items-center gap-2 mt-1 md:mt-2">
                        <span id="current-time-label" class="text-[10px] md:text-xs font-bold text-indigo-600 tabular-nums">00:00</span>
                        <span id="status-label" class="text-[8px] md:text-[9px] font-black text-slate-300 uppercase tracking-widest">---</span>
                    </div>
                </div>
                <div class="relative w-14 h-14 md:w-16 md:h-16">
                    <svg class="progress-ring" width="56" height="56" viewBox="0 0 64 64">
                        <circle class="text-slate-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        <circle id="progress-circle" class="progress-ring__circle text-indigo-500" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                    </svg>
                    <div id="progress-text" class="absolute inset-0 flex items-center justify-center text-[9px] md:text-[10px] font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="dash-card dash-card-dark p-6 flex items-center justify-between">
                <div class="w-2/3">
                    <span class="text-[8px] md:text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-1">A Continuación</span>
                    <h2 id="next-subject-name" class="text-xl md:text-2xl font-black tracking-tight truncate uppercase leading-none">---</h2>
                    <p id="next-subject-time" class="text-[8px] md:text-[9px] font-bold text-slate-400 uppercase mt-2 tracking-widest">---</p>
                </div>
                <div id="next-subject-icon" class="w-10 h-10 md:w-12 md:h-12 bg-white/10 rounded-xl flex items-center justify-center font-black border border-white/10 uppercase text-[10px]">--</div>
            </div>
        </div>

        <!-- Search and Mobile Nav -->
        <div class="flex flex-col gap-3 mb-6 no-pdf">
            <div class="relative">
                <input type="text" id="search-input" placeholder="Buscar por ramo o docente..." class="w-full bg-white border border-slate-200 p-3 md:p-4 pl-10 md:pl-12 rounded-xl md:rounded-2xl text-sm font-bold text-slate-900 shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <svg class="w-4 h-4 md:w-5 md:h-5 absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3"></path></svg>
            </div>
            
            <nav id="day-selector" class="md:hidden flex gap-1 overflow-x-auto pb-1 hide-scrollbar">
                <button onclick="switchDayTab(1)" class="day-tab-btn flex-1 min-w-[65px] py-2.5 rounded-xl text-[9px] font-black uppercase transition-all bg-white text-slate-400 border border-slate-200" data-day="1">Lun</button>
                <button onclick="switchDayTab(2)" class="day-tab-btn flex-1 min-w-[65px] py-2.5 rounded-xl text-[9px] font-black uppercase transition-all bg-white text-slate-400 border border-slate-200" data-day="2">Mar</button>
                <button onclick="switchDayTab(3)" class="day-tab-btn flex-1 min-w-[65px] py-2.5 rounded-xl text-[9px] font-black uppercase transition-all bg-white text-slate-400 border border-slate-200" data-day="3">Mié</button>
                <button onclick="switchDayTab(4)" class="day-tab-btn flex-1 min-w-[65px] py-2.5 rounded-xl text-[9px] font-black uppercase transition-all bg-white text-slate-400 border border-slate-200" data-day="4">Jue</button>
                <button onclick="switchDayTab(5)" class="day-tab-btn flex-1 min-w-[65px] py-2.5 rounded-xl text-[9px] font-black uppercase transition-all bg-white text-slate-400 border border-slate-200" data-day="5">Vie</button>
            </nav>
        </div>

        <!-- Timetable Grid -->
        <div id="pdf-grid" class="bg-white rounded-[2rem] md:rounded-[2.5rem] p-3 md:p-8 shadow-sm border border-slate-200 overflow-hidden">
            <div class="hidden md:grid grid-cols-12 gap-4 mb-6 px-4">
                <div class="col-span-1"></div>
                <div class="col-span-11 grid grid-cols-5 gap-4">
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Lunes</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Martes</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Miércoles</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Jueves</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Viernes</div>
                </div>
            </div>
            <div id="timetable-content" class="space-y-3 md:space-y-4"></div>
        </div>
    </div>

    <script>
        const subjectsData = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'P. Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'P. Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'J. Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'O. Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'J. Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'R. Higuera', cat: 'cat-humanidades' },
            'CSN': { name: 'Ciencias Naturales', teacher: 'Sazo/Flores/Contreras', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'S. Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'B. Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'R. Villarreal', cat: 'cat-humanidades' },
            'TAL': { name: 'Taller Pedagógico', teacher: 'V. Riquelme / J. Yañez', cat: 'cat-tecnica' },
            'TEC': { name: 'Educación Tecnológica', teacher: 'L. Vargas', cat: 'cat-tecnica' },
            'MUS': { name: 'Educación Musical', teacher: 'D. Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "TAL", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "Recreo" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CSN", "ING", "MTM", "CSN"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CSN", "OC", "MTM", "CSN"] },
            { type: 'break', time: ["11:30", "11:45"], label: "Recreo" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CSN", "TAL", "TEC"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CSN", "ART", "MUS"] },
            { type: 'period', id: 7, time: ["13:15", "14:00"], data: ["ALM", "ALM", "ALM", "ALM", "MUS"] },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'break', time: ["14:45", "14:55"], label: "Pausa" },
            { type: 'period', id: 9, time: ["14:55", "15:40"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:40", "16:25"], data: ["-", "OC", "-", "-", "-"] },
            { type: 'period', id: 11, time: ["16:25", "17:10"], data: ["-", "-", "-", "-", "-"] }
        ];

        let currentActiveIdx = -1;
        let searchQuery = "";
        let selectedDayMobile = new Date().getDay() || 1;
        if(selectedDayMobile > 5) selectedDayMobile = 1;

        function render() {
            const container = document.getElementById('timetable-content');
            if(!container) return;
            const now = new Date();
            const curDay = now.getDay();
            const hhmm = now.getHours() * 100 + now.getMinutes();
            const isMobile = window.innerWidth < 768;

            container.innerHTML = '';

            schedule.forEach((item) => {
                const sNum = parseInt(item.time[0].replace(':', ''));
                const eNum = parseInt(item.time[1].replace(':', ''));
                const isCurrentBlock = hhmm >= sNum && hhmm < eNum;

                if (item.type === 'break') {
                    const el = document.createElement('div');
                    const isTodayActive = isCurrentBlock && curDay >= 1 && curDay <= 5;
                    el.className = `grid grid-cols-12 items-center h-8 md:h-10 bg-slate-50 border-y border-slate-100 rounded-xl md:rounded-2xl px-3 md:px-4 transition-all ${isTodayActive ? 'ring-2 ring-indigo-200 bg-indigo-50' : ''}`;
                    el.innerHTML = `
                        <div class="col-span-2 md:col-span-1 text-[7px] md:text-[8px] font-black text-slate-300 tabular-nums text-center md:text-right md:pr-4">${item.time[0]}</div>
                        <div class="col-span-10 md:col-span-11 text-center text-[8px] md:text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">${item.label}</div>
                    `;
                    container.appendChild(el);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-2 md:gap-4 h-20 md:h-24 items-stretch';

                const timeCol = document.createElement('div');
                timeCol.className = 'col-span-2 md:col-span-1 flex flex-col justify-center text-center md:text-right md:pr-4 border-r border-slate-100';
                timeCol.innerHTML = `
                    <span class="text-[7px] md:text-[8px] font-black text-slate-300 mb-0.5 md:mb-1 uppercase tracking-tighter">B-${item.id}</span>
                    <span class="text-xs md:text-base font-black text-slate-900 leading-none tabular-nums ${isCurrentBlock ? 'text-indigo-600' : ''}">${item.time[0]}</span>
                    <span class="text-[8px] md:text-[9px] font-bold text-slate-200 mt-0.5 md:mt-1">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = `col-span-10 md:col-span-11 grid ${isMobile ? 'grid-cols-1' : 'grid-cols-5'} gap-2 md:gap-4`;

                item.data.forEach((code, cIdx) => {
                    const dayIndex = cIdx + 1;
                    if (isMobile && dayIndex !== selectedDayMobile) return;

                    const isTodayReal = dayIndex === curDay;
                    const isActive = isTodayReal && isCurrentBlock;
                    const block = document.createElement('div');

                    if (code === "-") {
                        block.className = 'bg-slate-50/50 rounded-xl md:rounded-[2rem] border border-dashed border-slate-100 h-full';
                    } else if (code === "ALM") {
                        block.className = `subject-pill lunch-card flex flex-col items-center justify-center h-full ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `<span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-orange-600">Almuerzo</span>`;
                    } else {
                        const info = subjectsData[code] || { name: code, teacher: '', cat: 'cat-tecnica' };
                        const matchesSearch = searchQuery !== "" && (code.toLowerCase().includes(searchQuery) || info.name.toLowerCase().includes(searchQuery));
                        const searchClass = searchQuery !== "" ? (matchesSearch ? "highlight-search" : "dim-search") : "";

                        block.className = `subject-pill ${info.cat} ${searchClass} p-3 md:p-4 flex flex-col justify-center items-center text-center h-full ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `
                            <div class="custom-tooltip">${info.name}</div>
                            <span class="text-slate-900 font-black text-lg md:text-2xl leading-none tracking-tighter">${code}</span>
                            <span class="text-slate-500 font-bold text-[8px] md:text-[10px] uppercase truncate w-full mt-0.5 md:mt-1 opacity-60">${info.teacher}</span>
                        `;
                    }
                    
                    if (isActive) {
                        const label = document.createElement('span');
                        label.className = 'active-label';
                        label.textContent = 'ACTUAL';
                        block.appendChild(label);
                    }

                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function switchDayTab(day) {
            selectedDayMobile = day;
            document.querySelectorAll('.day-tab-btn').forEach(btn => {
                if(parseInt(btn.dataset.day) === day) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-md');
                    btn.classList.remove('bg-white', 'text-slate-400', 'border-slate-200');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow-md');
                    btn.classList.add('bg-white', 'text-slate-400', 'border-slate-200');
                }
            });
            render();
        }

        function setProgress(percent) {
            const circle = document.getElementById('progress-circle');
            if(!circle) return;
            const r = 28;
            const circ = r * 2 * Math.PI;
            circle.style.strokeDashoffset = circ - (percent / 100 * circ);
            const pText = document.getElementById('progress-text');
            if(pText) pText.textContent = Math.round(percent) + '%';
        }

        function update() {
            const now = new Date();
            const day = now.getDay();
            const hhmm = now.getHours() * 100 + now.getMinutes();
            const daysArr = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
            
            const headerDate = document.getElementById('header-date');
            if(headerDate) headerDate.textContent = `${daysArr[day]}, ${now.getDate()} DE MARZO`;
            
            const timeLabel = document.getElementById('current-time-label');
            if(timeLabel) timeLabel.textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });

            let activeIdx = -1;
            let progress = 0;
            let tLeftStr = "--:--";
            let sLabel = "Standby";

            if (day >= 1 && day <= 5) {
                const curBlock = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (hhmm >= start && hhmm < end) {
                        activeIdx = idx;
                        const [sH, sM] = s.time[0].split(':').map(Number);
                        const [eH, eM] = s.time[1].split(':').map(Number);
                        const sT = sH * 60 + sM;
                        const eT = eH * 60 + eM;
                        const nT = now.getHours() * 60 + now.getMinutes();
                        progress = Math.max(0, Math.min(100, ((nT - sT) / (eT - sT)) * 100));
                        const remS = (eT - nT) * 60 - now.getSeconds();
                        tLeftStr = `${Math.floor(remS / 60)}:${(remS % 60).toString().padStart(2, '0')}`;
                        return true;
                    }
                    return false;
                });

                if (curBlock) {
                    sLabel = curBlock.type === 'break' ? "RECREO" : "MÓDULO";
                    let nIdx = activeIdx + 1;
                    while(nIdx < schedule.length && schedule[nIdx].type === 'break') nIdx++;
                    if(nIdx < schedule.length) {
                        const next = schedule[nIdx];
                        const code = next.data[day-1];
                        const nextName = document.getElementById('next-subject-name');
                        const nextTime = document.getElementById('next-subject-time');
                        const nextIcon = document.getElementById('next-subject-icon');
                        if(code && code !== "-") {
                            if(nextName) nextName.textContent = subjectsData[code]?.name || code;
                            if(nextTime) nextTime.textContent = `A LAS ${next.time[0]}`;
                            if(nextIcon) nextIcon.textContent = code.substring(0,2);
                        } else {
                            if(nextName) nextName.textContent = "FIN JORNADA";
                            if(nextTime) nextTime.textContent = "CERRADO";
                            if(nextIcon) nextIcon.textContent = "✓";
                        }
                    }
                }
            }

            if(document.getElementById('time-left')) document.getElementById('time-left').textContent = tLeftStr;
            if(document.getElementById('status-label')) document.getElementById('status-label').textContent = sLabel;
            
            setProgress(progress);

            if (activeIdx !== currentActiveIdx) {
                currentActiveIdx = activeIdx;
                render();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const opt = {
                margin: 0.1,
                filename: 'Horario_8A_Ambar.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            render();
        });

        window.addEventListener('resize', render);
        switchDayTab(selectedDayMobile);
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
