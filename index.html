<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8° Ambar | Tech Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-base: #0f172a;
            --panel-bg: #1e293b;
            --accent-main: #6366f1;
            --accent-cyan: #06b6d4;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }

        /* Technical Category Colors */
        .cat-humanidades { border-left: 5px solid #f43f5e; background: linear-gradient(135deg, rgba(244, 63, 94, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-ciencias { border-left: 5px solid #10b981; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-exactas { border-left: 5px solid #6366f1; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-artes { border-left: 5px solid #f59e0b; background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-deporte { border-left: 5px solid #06b6d4; background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-tecnica { border-left: 5px solid #94a3b8; background: linear-gradient(135deg, rgba(148, 163, 184, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        .cat-orientacion { border-left: 5px solid #d946ef; background: linear-gradient(135deg, rgba(217, 70, 239, 0.1) 0%, rgba(30, 41, 59, 0.4) 100%); }
        
        .lunch-card { border-left: 5px solid #fb923c; background: rgba(251, 146, 60, 0.05); border-color: rgba(251, 146, 60, 0.3); }
        .break-row { background: rgba(255, 255, 255, 0.02); border-top: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .active-cell {
            outline: 2px solid var(--accent-main);
            outline-offset: 1px;
            background: rgba(99, 102, 241, 0.15) !important;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
            z-index: 20;
        }

        .merge-top { border-top: 0 !important; border-top-left-radius: 0 !important; border-top-right-radius: 0 !important; }
        .merge-bottom { border-bottom: 0 !important; border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }

        @media (max-width: 768px) {
            .subject-card { min-height: 80px; }
        }

        @media print { 
            .no-pdf { display: none !important; } 
            body { background-color: white; color: black; }
            #pdf-grid { border: 1px solid #ddd; background: white; }
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="max-w-[1500px] mx-auto px-4 py-6 md:py-10">
        
        <!-- Command Header -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
            
            <header class="lg:col-span-2 glass-panel p-6 rounded-3xl border border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tighter text-white leading-none">8° Ambar</h1>
                        <p id="header-date" class="text-indigo-300 text-[10px] font-black uppercase tracking-[0.25em] mt-2">---</p>
                    </div>
                </div>
                <button onclick="downloadPDF()" class="no-pdf p-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all border border-white/10 group">
                    <svg class="w-5 h-5 text-white/60 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2"></path></svg>
                </button>
            </header>

            <div class="glass-panel p-6 rounded-3xl border border-white/5 flex items-center justify-between">
                <div>
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest mb-1 block">Status Operativo</span>
                    <span id="current-time" class="text-3xl font-black tabular-nums text-white leading-none">00:00</span>
                    <div class="flex items-center gap-2 mt-2">
                        <div id="status-dot" class="w-2 h-2 bg-slate-500 rounded-full"></div>
                        <span id="status-label" class="text-[9px] font-bold text-white/40 uppercase tracking-tight">Sincronizando...</span>
                    </div>
                </div>
                <div class="relative w-14 h-14">
                    <svg class="progress-ring" width="56" height="56">
                        <circle class="text-white/5" stroke-width="4" stroke="currentColor" fill="transparent" r="24" cx="28" cy="28"/>
                        <circle id="progress-circle" class="progress-ring__circle text-indigo-400" stroke-width="4" stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round" stroke="currentColor" fill="transparent" r="24" cx="28" cy="28"/>
                    </svg>
                    <div id="progress-text" class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-indigo-300">0%</div>
                </div>
            </div>

            <div id="next-class-panel" class="bg-indigo-600/90 p-6 rounded-3xl shadow-xl flex items-center justify-between text-white relative overflow-hidden">
                <div class="relative z-10">
                    <span class="text-[9px] font-black text-white/50 uppercase tracking-widest mb-1 block">Próxima Actividad</span>
                    <h2 id="next-subject-name" class="text-lg font-extrabold tracking-tight truncate w-32">---</h2>
                    <p id="next-subject-time" class="text-[9px] font-bold text-white/60 uppercase mt-1">---</p>
                </div>
                <div id="next-subject-icon" class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center font-black text-sm z-10 border border-white/10">--</div>
                <svg class="absolute -right-4 -bottom-4 w-24 h-24 text-white/5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2z"/></svg>
            </div>
        </div>

        <!-- Mobile Navigation -->
        <nav class="md:hidden flex gap-1.5 mb-6 overflow-x-auto no-pdf pb-2 hide-scrollbar">
            <button onclick="switchDay(1)" class="day-tab flex-1 min-w-[75px] px-3 py-3 rounded-2xl text-[10px] font-black bg-white/5 border border-white/5 text-white/30 uppercase tracking-tighter" data-day="1">Lun</button>
            <button onclick="switchDay(2)" class="day-tab flex-1 min-w-[75px] px-3 py-3 rounded-2xl text-[10px] font-black bg-white/5 border border-white/5 text-white/30 uppercase tracking-tighter" data-day="2">Mar</button>
            <button onclick="switchDay(3)" class="day-tab flex-1 min-w-[75px] px-3 py-3 rounded-2xl text-[10px] font-black bg-white/5 border border-white/5 text-white/30 uppercase tracking-tighter" data-day="3">Mié</button>
            <button onclick="switchDay(4)" class="day-tab flex-1 min-w-[75px] px-3 py-3 rounded-2xl text-[10px] font-black bg-white/5 border border-white/5 text-white/30 uppercase tracking-tighter" data-day="4">Jue</button>
            <button onclick="switchDay(5)" class="day-tab flex-1 min-w-[75px] px-3 py-3 rounded-2xl text-[10px] font-black bg-white/5 border border-white/5 text-white/30 uppercase tracking-tighter" data-day="5">Vie</button>
        </nav>

        <!-- Main Timetable Content -->
        <div id="pdf-grid" class="glass-panel p-2 md:p-6 rounded-[2.5rem] border border-white/5">
            <div class="min-w-full">
                <!-- Grid Labels -->
                <div class="hidden md:grid grid-cols-12 gap-4 mb-6 px-4">
                    <div class="col-span-1"></div>
                    <div class="col-span-11 grid grid-cols-5 gap-4">
                        <div class="text-center font-black text-[10px] text-white/20 uppercase tracking-[0.3em]">Lunes</div>
                        <div class="text-center font-black text-[10px] text-white/20 uppercase tracking-[0.3em]">Martes</div>
                        <div class="text-center font-black text-[10px] text-white/20 uppercase tracking-[0.3em]">Miércoles</div>
                        <div class="text-center font-black text-[10px] text-white/20 uppercase tracking-[0.3em]">Jueves</div>
                        <div class="text-center font-black text-[10px] text-white/20 uppercase tracking-[0.3em]">Viernes</div>
                    </div>
                </div>
                <!-- Rows Container -->
                <div id="timetable-content" class="space-y-2 md:space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Hidden element for status pings to avoid reference errors -->
    <div id="status-ping" class="hidden"></div>

    <script>
        const subjectsData = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'Prof. Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'Prof. Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'Prof. Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'Prof. Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'Prof. Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'Prof. Higuera', cat: 'cat-humanidades' },
            'CS NAT': { name: 'Ciencias Naturales', teacher: 'Contreras/Sazo/Flores', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'Prof. Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'Prof. Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'Prof. Villarreal', cat: 'cat-humanidades' },
            'Taller Pedagogo': { name: 'Refuerzo Pedagógico', teacher: 'Especialistas', cat: 'cat-tecnica' },
            'TEC N': { name: 'Educación Tecnológica', teacher: 'Prof. Vargas', cat: 'cat-tecnica' },
            'MÚS': { name: 'Educación Musical', teacher: 'Prof. Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "Taller Pedagogo", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "Pausa Operativa" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CS NAT", "ING", "MTM", "CS NAT"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CS NAT", "OC", "MTM", "CS NAT"] },
            { type: 'break', time: ["11:30", "11:45"], label: "Pausa Operativa" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CS NAT", "Taller Pedagogo", "TEC N"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CS NAT", "ART", "MÚS"] },
            { type: 'period', id: 7, time: ["13:15", "14:00"], data: ["ALM", "ALM", "ALM", "ALM", "MÚS"] },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "MÚS"] },
            { type: 'break', time: ["14:45", "14:55"], label: "Pausa Corta" },
            { type: 'period', id: 9, time: ["14:55", "15:40"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:40", "16:25"], data: ["-", "OC", "-", "-", "-"] },
            { type: 'period', id: 11, time: ["16:25", "17:10"], data: ["-", "-", "-", "-", "-"] }
        ];

        let currentActiveDay = new Date().getDay() || 1; 
        if (currentActiveDay > 5) currentActiveDay = 1;
        let lastKnownActiveIndex = -1;

        function renderTimetable() {
            const container = document.getElementById('timetable-content');
            if(!container) return;
            const isMobile = window.innerWidth < 768;
            const now = new Date();
            const currentDay = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            
            container.innerHTML = '';

            schedule.forEach((item, rowIndex) => {
                const startNum = parseInt(item.time[0].replace(':', ''));
                const endNum = parseInt(item.time[1].replace(':', ''));
                const isCurrentBlock = currentHHMM >= startNum && currentHHMM < endNum;

                if (item.type === 'break') {
                    const row = document.createElement('div');
                    row.className = `grid grid-cols-12 gap-3 items-center h-8 break-row rounded-xl px-4 transition-all duration-500 ${isCurrentBlock && currentDay >= 1 && currentDay <= 5 ? 'bg-indigo-500/10 border-indigo-500/30' : ''}`;
                    row.innerHTML = `
                        <div class="col-span-2 md:col-span-1 text-right text-[8px] font-black text-white/20 tabular-nums">${item.time[0]}</div>
                        <div class="col-span-10 md:col-span-11 text-center text-[9px] font-black uppercase tracking-[0.4em] text-white/30">${item.label}</div>
                    `;
                    container.appendChild(row);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-3 md:gap-4 h-24 items-stretch';
                
                const timeCol = document.createElement('div');
                timeCol.className = `col-span-2 md:col-span-1 flex flex-col justify-center text-right pr-4 border-r border-white/5 ${isCurrentBlock ? 'text-indigo-400' : 'text-white/20'}`;
                timeCol.innerHTML = `
                    <span class="font-black text-[8px] mb-1 opacity-50 uppercase">B-${item.id}</span>
                    <span class="font-black text-xs md:text-sm tabular-nums leading-none">${item.time[0]}</span>
                    <span class="font-bold text-[8px] opacity-40 mt-1">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = 'col-span-10 md:col-span-11 grid grid-cols-1 md:grid-cols-5 gap-3 md:gap-4';

                item.data.forEach((code, colIndex) => {
                    const isToday = (colIndex + 1) === currentDay;
                    const isActive = isToday && isCurrentBlock;
                    if (isMobile && (colIndex + 1) !== currentActiveDay) return;

                    const block = document.createElement('div');
                    
                    if (code === "-") {
                        block.className = 'bg-white/[0.02] rounded-2xl border border-dashed border-white/5 h-full';
                    } else if (code === "ALM") {
                        block.className = `lunch-card rounded-2xl flex flex-col items-center justify-center h-full border ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `<span class="text-[9px] font-black text-orange-400 uppercase tracking-widest">Almuerzo</span>`;
                    } else {
                        const info = subjectsData[code];
                        const prev = schedule[rowIndex - 1];
                        const next = schedule[rowIndex + 1];
                        let mergeClass = "";
                        if (prev && prev.type === 'period' && prev.data[colIndex] === code) mergeClass += " merge-top";
                        if (next && next.type === 'period' && next.data[colIndex] === code) mergeClass += " merge-bottom";

                        block.className = `subject-card ${info.cat} ${mergeClass} p-4 rounded-2xl border border-white/5 shadow-sm flex flex-col justify-center items-center text-center h-full transition-all duration-300 ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `
                            <span class="text-white font-black text-sm md:text-lg leading-none mb-1 tracking-tight">${code}</span>
                            <span class="text-white/40 font-bold text-[9px] uppercase tracking-tighter truncate w-full">${info.teacher.split(' ').pop()}</span>
                        `;
                    }
                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function setProgress(percent) {
            const circle = document.getElementById('progress-circle');
            if(!circle) return;
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
            const pText = document.getElementById('progress-text');
            if(pText) pText.textContent = Math.round(percent) + '%';
        }

        function switchDay(day) {
            currentActiveDay = day;
            document.querySelectorAll('.day-tab').forEach(t => {
                t.classList.remove('bg-indigo-500', 'text-white', 'border-indigo-500');
                t.classList.add('bg-white/5', 'text-white/30');
                if (parseInt(t.dataset.day) === day) {
                    t.classList.add('bg-indigo-500', 'text-white', 'border-indigo-500');
                    t.classList.remove('bg-white/5', 'text-white/30');
                }
            });
            renderTimetable();
        }

        function updateStatus() {
            const now = new Date();
            const day = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            const isWeekDay = day >= 1 && day <= 5;
            
            const daysArr = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            const headerDate = document.getElementById('header-date');
            if(headerDate) headerDate.textContent = `${daysArr[day]} ${now.getDate()} DE MARZO`;
            
            const timeDisplay = document.getElementById('current-time');
            if(timeDisplay) timeDisplay.textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });

            let statusStr = "Sistema Standby";
            let activeIdx = -1;
            let progress = 0;

            if (isWeekDay) {
                const activeItem = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (currentHHMM >= start && currentHHMM < end) {
                        activeIdx = idx;
                        
                        const [sH, sM] = s.time[0].split(':').map(Number);
                        const [eH, eM] = s.time[1].split(':').map(Number);
                        const startTotal = sH * 60 + sM;
                        const endTotal = eH * 60 + eM;
                        const nowTotal = now.getHours() * 60 + now.getMinutes();
                        progress = Math.max(0, Math.min(100, ((nowTotal - startTotal) / (endTotal - startTotal)) * 100));
                        
                        return true;
                    }
                    return false;
                });

                if (activeItem) {
                    statusStr = activeItem.type === 'break' ? "En Recreo" : "Actividad Lectiva";
                    const ping = document.getElementById('status-ping');
                    if(ping) ping.classList.remove('hidden');
                    
                    let nextIdx = activeIdx + 1;
                    while(nextIdx < schedule.length && schedule[nextIdx].type === 'break') nextIdx++;
                    
                    if(nextIdx < schedule.length) {
                        const next = schedule[nextIdx];
                        const nextCode = next.data[day-1];
                        const nsName = document.getElementById('next-subject-name');
                        const nsTime = document.getElementById('next-subject-time');
                        const nsIcon = document.getElementById('next-subject-icon');

                        if(nextCode && nextCode !== "-") {
                            const info = subjectsData[nextCode] || { name: nextCode };
                            if(nsName) nsName.textContent = info.name;
                            if(nsTime) nsTime.textContent = `T-MINUS: ${next.time[0]}`;
                            if(nsIcon) nsIcon.textContent = nextCode.substring(0,2);
                        } else {
                            if(nsName) nsName.textContent = "Finalización";
                            if(nsTime) nsTime.textContent = "Fin de Jornada";
                        }
                    }
                } else {
                    const ping = document.getElementById('status-ping');
                    if(ping) ping.classList.add('hidden');
                    progress = 0;
                    const nsName = document.getElementById('next-subject-name');
                    if(nsName) nsName.textContent = "Día Terminado";
                }
            }

            const labelDisplay = document.getElementById('status-label');
            if(labelDisplay) labelDisplay.textContent = statusStr;
            
            const dot = document.getElementById('status-dot');
            if(dot) dot.style.backgroundColor = isWeekDay ? '#6366f1' : '#475569';
            
            setProgress(progress);

            if (activeIdx !== lastKnownActiveIndex) {
                lastKnownActiveIndex = activeIdx;
                renderTimetable();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const originalDay = currentActiveDay;
            const isMobile = window.innerWidth < 768;

            if (isMobile) {
                const container = document.getElementById('timetable-content');
                container.innerHTML = '';
                schedule.forEach((item) => {
                    if (item.type === 'break') {
                        const el = document.createElement('div');
                        el.className = `grid grid-cols-12 h-6 border-y border-white/5 items-center bg-black/10 mb-1`;
                        el.innerHTML = `<div class="col-span-1 text-[6px] text-center font-black">${item.time[0]}</div><div class="col-span-11 text-center text-[7px] font-black uppercase">${item.label}</div>`;
                        container.appendChild(el);
                        return;
                    }
                    const row = document.createElement('div');
                    row.className = 'grid grid-cols-12 gap-1 h-12 items-stretch';
                    const timeCol = document.createElement('div');
                    timeCol.className = 'col-span-1 flex flex-col justify-center text-center border-r border-white/5';
                    timeCol.innerHTML = `<span class="text-[6px] font-black">${item.time[0]}</span>`;
                    row.appendChild(timeCol);
                    const grid = document.createElement('div');
                    grid.className = 'col-span-11 grid grid-cols-5 gap-1 h-full';
                    item.data.forEach((code) => {
                        const block = document.createElement('div');
                        if (code === "-") block.className = 'bg-white/5 border border-dashed border-white/5';
                        else if (code === "ALM") {
                            block.className = `bg-orange-500/10 border border-orange-500/20 rounded flex items-center justify-center h-full`;
                            block.innerHTML = `<span class="text-[6px] font-black uppercase text-orange-400">ALM</span>`;
                        } else {
                            const info = subjectsData[code];
                            block.className = `bg-white/5 rounded border border-white/5 flex items-center justify-center h-full`;
                            block.innerHTML = `<span class="text-white font-black text-[8px] leading-none">${code}</span>`;
                        }
                        grid.appendChild(block);
                    });
                    row.appendChild(grid);
                    container.appendChild(row);
                });
            }

            const opt = {
                margin: 0.1,
                filename: '8A_Command_Horario.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#0f172a' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if (isMobile) switchDay(originalDay);
                else renderTimetable();
            });
        }

        window.addEventListener('resize', renderTimetable);
        updateStatus();
        switchDay(currentActiveDay);
        setInterval(updateStatus, 30000); // Update every 30 seconds
    </script>
</body>
</html>
