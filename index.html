<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario 8° Ambar | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --text-main: #0f172a;
            --accent: #4f46e5;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .subject-card {
            transition: all 0.2s ease;
            border-left-width: 4px;
            position: relative;
        }
        @media (min-width: 768px) {
            .subject-card:hover {
                transform: scale(1.02);
                box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.1);
                z-index: 50;
            }
        }
        .cat-humanidades { border-left-color: #dc2626; background-color: #fee2e2; }
        .cat-ciencias { border-left-color: #059669; background-color: #d1fae5; }
        .cat-exactas { border-left-color: #2563eb; background-color: #dbeafe; }
        .cat-artes { border-left-color: #d97706; background-color: #fef3c7; }
        .cat-deporte { border-left-color: #7c3aed; background-color: #ede9fe; }
        .cat-tecnica { border-left-color: #475569; background-color: #f1f5f9; }
        .cat-orientacion { border-left-color: #db2777; background-color: #fce7f3; }

        /* Resaltado de bloque activo */
        .active-block {
            outline: 3px solid var(--accent);
            outline-offset: -1px;
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.15);
            z-index: 40;
        }
        .active-time {
            color: var(--accent) !important;
            font-weight: 800 !important;
        }

        .custom-tooltip {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: all 0.15s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 100;
            width: 12rem;
        }
        .tooltip-center { left: 50%; transform: translateX(-50%); }
        .tooltip-right { right: 0; left: auto; transform: none; }
        .tooltip-left { left: 0; transform: none; }
        .tooltip-down { top: 115%; margin-top: 5px; }
        .tooltip-up { bottom: 115%; margin-bottom: 5px; }

        @media (min-width: 768px) {
            .subject-card:hover .custom-tooltip { opacity: 1; }
            .subject-card:hover .tooltip-up { transform: translateY(-5px) translateX(-50%); }
            .subject-card:hover .tooltip-right.tooltip-up { transform: translateY(-5px); }
            .subject-card:hover .tooltip-left.tooltip-up { transform: translateY(-5px); }
            .subject-card:hover .tooltip-down { transform: translateY(5px) translateX(-50%); }
            .subject-card:hover .tooltip-right.tooltip-down { transform: translateY(5px); }
            .subject-card:hover .tooltip-left.tooltip-down { transform: translateY(5px); }
        }

        .break-row-ui { background-color: #fef3c7; color: #92400e; font-weight: 800; border-top: 1px solid #fde68a; border-bottom: 1px solid #fde68a; }
        .lunch-row-ui { background-color: #dcfce7; color: #166534; font-weight: 800; border-top: 1px solid #bbf7d0; border-bottom: 1px solid #bbf7d0; }
        .active-break { outline: 2px solid currentColor; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }

        .merge-top { border-top-left-radius: 0 !important; border-top-right-radius: 0 !important; border-top: 0 !important; }
        .merge-bottom { border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; border-bottom: 0 !important; }
        
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body class="min-h-screen">
    <div class="w-full px-2 py-4 md:px-6 md:py-8">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="space-y-1">
                <div class="flex items-center gap-3 flex-wrap">
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">8° Ambar</h1>
                    <span class="bg-slate-900 text-white px-2 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider">2026</span>
                    <button onclick="downloadPDF()" class="no-pdf bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-tight shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        PDF
                    </button>
                </div>
                <div class="flex items-center text-slate-500 font-semibold text-xs gap-2">
                    <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m4 0h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    <span>Fundación Educar para la Vida</span>
                </div>
            </div>
            
            <div id="status-container" class="flex items-center gap-4 bg-slate-50 px-4 py-3 rounded-xl border border-slate-100 shadow-inner w-full sm:w-auto">
                <div class="relative">
                    <div id="status-dot" class="w-2.5 h-2.5 bg-slate-400 rounded-full"></div>
                    <div id="status-ping" class="absolute inset-0 w-2.5 h-2.5 bg-slate-400 rounded-full animate-ping opacity-75 hidden"></div>
                </div>
                <div>
                    <p id="current-time" class="text-xl font-black text-slate-900 tabular-nums leading-none">00:00</p>
                    <p id="current-info" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Sincronizando</p>
                </div>
            </div>
        </header>

        <nav class="md:hidden flex gap-1 mb-4 overflow-x-auto no-pdf pb-2">
            <button onclick="switchDay(1)" class="day-tab px-4 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-600" data-day="1">Lun</button>
            <button onclick="switchDay(2)" class="day-tab px-4 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-600" data-day="2">Mar</button>
            <button onclick="switchDay(3)" class="day-tab px-4 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-600" data-day="3">Mié</button>
            <button onclick="switchDay(4)" class="day-tab px-4 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-600" data-day="4">Jue</button>
            <button onclick="switchDay(5)" class="day-tab px-4 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-600" data-day="5">Vie</button>
        </nav>

        <div id="pdf-grid" class="bg-white p-2 md:p-6 rounded-2xl shadow-sm border border-slate-200 overflow-visible">
            <div class="min-w-full">
                <div class="hidden md:grid grid-cols-12 gap-4 mb-4 font-black text-[10px] uppercase tracking-wider text-slate-400 px-2">
                    <div class="col-span-1 text-center">Hora</div>
                    <div class="col-span-11 grid grid-cols-5 gap-4">
                        <div class="text-center">Lunes</div>
                        <div class="text-center">Martes</div>
                        <div class="text-center">Miércoles</div>
                        <div class="text-center">Jueves</div>
                        <div class="text-center">Viernes</div>
                    </div>
                </div>
                <div id="timetable-content" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const subjects = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'P. Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'P. Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'J. Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'O. Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'J. Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'R. Higuera', cat: 'cat-humanidades' },
            'CS NAT': { name: 'Ciencias Naturales', teacher: 'F. Sazo/M. Flores', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'S. Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'B. Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'R. Villarreal', cat: 'cat-humanidades' },
            'Taller Pedagogo': { name: 'Refuerzo Pedagógico', teacher: 'V. Riquelme/J. Yañez', cat: 'cat-tecnica' },
            'TEC N': { name: 'Educación Tecnológica', teacher: 'L. Vargas', cat: 'cat-tecnica' },
            'MÚS': { name: 'Educación Musical', teacher: 'D. Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "Taller Pedagogo", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "Recreo", ui: "break-row-ui" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CS NAT", "ING", "MTM", "CS NAT"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CS NAT", "OC", "MTM", "CS NAT"] },
            { type: 'break', time: ["11:30", "11:45"], label: "Recreo", ui: "break-row-ui" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CS NAT", "Taller Pedagogo", "TEC N"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CS NAT", "ART", "MÚS"] },
            { type: 'break', time: ["13:15", "14:00"], label: "Almuerzo", ui: "lunch-row-ui" },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'break', time: ["14:45", "14:55"], label: "Recreo", ui: "break-row-ui" },
            { type: 'period', id: 9, time: ["14:55", "15:40"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:40", "16:25"], data: ["-", "OC", "-", "-", "-"] },
            { type: 'period', id: 11, time: ["16:25", "17:10"], data: ["-", "-", "-", "-", "-"] }
        ];

        let currentActiveDay = new Date().getDay() || 1; 
        if (currentActiveDay > 5) currentActiveDay = 1;
        let lastKnownActiveIndex = -1;

        function renderTimetable() {
            const container = document.getElementById('timetable-content');
            const isMobile = window.innerWidth < 768;
            const now = new Date();
            const currentDay = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            
            container.innerHTML = '';

            schedule.forEach((item, rowIndex) => {
                const startTime = parseInt(item.time[0].replace(':', ''));
                const endTime = parseInt(item.time[1].replace(':', ''));
                const isCurrentTimeSlot = currentHHMM >= startTime && currentHHMM < endTime;

                if (item.type === 'break') {
                    const el = document.createElement('div');
                    const isActiveBreak = isCurrentTimeSlot && (currentDay >= 1 && currentDay <= 5);
                    el.className = `grid grid-cols-12 gap-2 md:gap-4 items-center h-8 ${item.ui} rounded-lg mb-1 ${isActiveBreak ? 'active-break' : ''}`;
                    el.innerHTML = `
                        <div class="col-span-2 md:col-span-1 text-right pr-4 text-[8px] font-black">${item.time[0]}-${item.time[1]}</div>
                        <div class="col-span-10 md:col-span-11 text-center text-[9px] font-black tracking-widest">${item.label}</div>
                    `;
                    container.appendChild(el);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-2 md:gap-4 h-20 items-stretch';
                
                const timeCol = document.createElement('div');
                timeCol.className = `col-span-2 md:col-span-1 flex flex-col justify-center text-right pr-4 border-r-2 border-slate-100 ${isCurrentTimeSlot ? 'active-time' : ''}`;
                timeCol.innerHTML = `
                    <span class="text-slate-900 font-black text-xs ${isCurrentTimeSlot ? 'text-indigo-600' : ''}">#${item.id}</span>
                    <span class="font-bold text-[9px] ${isCurrentTimeSlot ? 'text-indigo-600' : 'text-slate-500'}">${item.time[0]}</span>
                    <span class="font-bold text-[8px] ${isCurrentTimeSlot ? 'text-indigo-400' : 'text-slate-300'}">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = 'col-span-10 md:col-span-11 grid grid-cols-1 md:grid-cols-5 gap-2 md:gap-4';

                item.data.forEach((code, colIndex) => {
                    const isToday = (colIndex + 1) === currentDay;
                    const isActiveSubject = isToday && isCurrentTimeSlot;

                    if (isMobile && (colIndex + 1) !== currentActiveDay) return;

                    const block = document.createElement('div');
                    if (code === "-") {
                        block.className = 'bg-slate-50 rounded-xl border border-dashed border-slate-200 h-full flex items-center justify-center';
                        block.innerHTML = '<span class="text-[8px] text-slate-300 font-black uppercase">Vacío</span>';
                    } else {
                        const info = subjects[code];
                        const prev = schedule[rowIndex - 1];
                        const next = schedule[rowIndex + 1];
                        let merge = "";
                        if (prev && prev.type === 'period' && prev.data[colIndex] === code) merge += " merge-top";
                        if (next && next.type === 'period' && next.data[colIndex] === code) merge += " merge-bottom";

                        const vPos = rowIndex < 7 ? 'tooltip-down' : 'tooltip-up';
                        let hPos = 'tooltip-center';
                        if (colIndex === 0) hPos = 'tooltip-left';
                        if (colIndex === 4) hPos = 'tooltip-right';

                        block.className = `subject-card ${info.cat} ${merge} bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center items-center text-center h-full ${isActiveSubject ? 'active-block' : ''}`;
                        block.innerHTML = `
                            <div class="custom-tooltip ${vPos} ${hPos} bg-slate-900 text-white p-3 rounded-xl border border-slate-700 no-pdf">
                                <p class="font-black text-[10px] text-indigo-400 mb-1 uppercase">${info.name}</p>
                                <p class="text-[9px] font-bold uppercase opacity-70">${info.teacher}</p>
                            </div>
                            <span class="text-slate-900 font-black text-sm md:text-base leading-none mb-1">${code}</span>
                            <span class="text-slate-400 font-bold text-[9px] uppercase truncate w-full">${info.teacher}</span>
                        `;
                    }
                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function switchDay(day) {
            currentActiveDay = day;
            document.querySelectorAll('.day-tab').forEach(t => {
                t.classList.remove('bg-indigo-600', 'text-white');
                t.classList.add('bg-white', 'text-slate-600');
                if (parseInt(t.dataset.day) === day) {
                    t.classList.add('bg-indigo-600', 'text-white');
                    t.classList.remove('bg-white', 'text-slate-600');
                }
            });
            renderTimetable();
        }

        function updateStatus() {
            const now = new Date();
            const day = now.getDay();
            const currentHHMM = now.getHours() * 100 + now.getMinutes();
            const dailyClosing = { 1: 1540, 2: 1625, 3: 1540, 4: 1540, 5: 1315 };
            const isWeekDay = day >= 1 && day <= 5;
            
            document.getElementById('current-time').textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            const infoText = document.getElementById('current-info');
            const dot = document.getElementById('status-dot');
            const ping = document.getElementById('status-ping');

            let status = "Fuera de Horario";
            let colorClass = "text-slate-400";
            let dotColor = "bg-slate-300";
            let activeIdx = -1;

            if (isWeekDay && currentHHMM >= 815 && currentHHMM <= (dailyClosing[day] || 0)) {
                const activeItem = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (currentHHMM >= start && currentHHMM < end) {
                        activeIdx = idx;
                        return true;
                    }
                    return false;
                });

                if (activeItem) {
                    if (activeItem.type === 'break') {
                        status = "En " + activeItem.label;
                        colorClass = "text-amber-600";
                        dotColor = "bg-amber-500";
                    } else {
                        status = "Jornada Activa";
                        colorClass = "text-emerald-600";
                        dotColor = "bg-emerald-500";
                    }
                }
                ping.classList.remove('hidden');
            } else {
                ping.classList.add('hidden');
            }

            infoText.textContent = status;
            infoText.className = `text-[9px] ${colorClass} font-bold uppercase tracking-widest mt-1`;
            dot.className = `w-2.5 h-2.5 ${dotColor} rounded-full`;

            // Forzar re-render solo si cambió el bloque activo para ahorrar recursos
            if (activeIdx !== lastKnownActiveIndex) {
                lastKnownActiveIndex = activeIdx;
                renderTimetable();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const originalDay = currentActiveDay;
            const isMobile = window.innerWidth < 768;

            if (isMobile) {
                // Renderizado completo temporal para captura PDF en móvil
                const container = document.getElementById('timetable-content');
                container.innerHTML = '';
                schedule.forEach((item, rowIndex) => {
                    if (item.type === 'break') {
                        const el = document.createElement('div');
                        el.className = `grid grid-cols-12 gap-1 items-center h-6 ${item.ui} rounded mb-1`;
                        el.innerHTML = `<div class="col-span-1 text-center text-[6px] font-black">${item.time[0]}</div><div class="col-span-11 text-center text-[7px] font-black uppercase">${item.label}</div>`;
                        container.appendChild(el);
                        return;
                    }
                    const row = document.createElement('div');
                    row.className = 'grid grid-cols-12 gap-1 h-14 items-stretch';
                    const timeCol = document.createElement('div');
                    timeCol.className = 'col-span-1 flex flex-col justify-center text-center border-r border-slate-100';
                    timeCol.innerHTML = `<span class="text-[6px] font-black">${item.time[0]}</span>`;
                    row.appendChild(timeCol);
                    const grid = document.createElement('div');
                    grid.className = 'col-span-11 grid grid-cols-5 gap-1 h-full';
                    item.data.forEach((code) => {
                        const block = document.createElement('div');
                        if (code === "-") block.className = 'bg-slate-50 border border-dashed border-slate-100';
                        else {
                            const info = subjects[code];
                            block.className = `subject-card ${info.cat} bg-white rounded border border-slate-100 flex flex-col justify-center items-center text-center h-full`;
                            block.innerHTML = `<span class="text-slate-900 font-black text-[8px] leading-none">${code}</span>`;
                        }
                        grid.appendChild(block);
                    });
                    row.appendChild(grid);
                    container.appendChild(row);
                });
            }

            const opt = {
                margin: 0.2,
                filename: 'Horario_8A_Ambar.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if (isMobile) switchDay(originalDay);
                else renderTimetable();
            });
        }

        window.addEventListener('resize', renderTimetable);
        updateStatus();
        switchDay(currentActiveDay);
        setInterval(updateStatus, 15000);
    </script>
</body>
</html>
