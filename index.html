<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8° A Ámbar | Dashboard Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-page: #f0f4f8;
            --text-main: #1e293b;
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Categorías Pastel */
        .cat-humanidades { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .cat-exactas { background-color: #dbeafe; border-left: 4px solid #3b82f6; }
        .cat-ciencias { background-color: #d1fae5; border-left: 4px solid #10b981; }
        .cat-artes { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        .cat-deporte { background-color: #f3e8ff; border-left: 4px solid #8b5cf6; }
        .cat-tecnica { background-color: #f1f5f9; border-left: 4px solid #64748b; }
        .cat-orientacion { background-color: #fae8ff; border-left: 4px solid #d946ef; }

        .lunch-card { background-color: #fff7ed; border: 1px dashed #f97316; }
        .break-row { background-color: #e2e8f0; color: #475569; }

        .subject-pill {
            border-radius: 2rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Resaltado con Etiqueta ACTUAL */
        .active-cell {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
            z-index: 30;
            background-color: white !important;
        }

        .active-label {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0f172a;
            color: white;
            font-size: 8px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 1px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .dash-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dash-card-dark {
            background: #0f172a;
            color: white;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .custom-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #0f172a;
            color: white;
            padding: 6px 12px;
            border-radius: 0.75rem;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .subject-pill:hover .custom-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-pdf { display: none !important; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-[1400px] mx-auto">
        
        <!-- Barra de Leyenda -->
        <div class="bg-white rounded-full px-6 py-3 mb-6 flex flex-wrap items-center justify-between shadow-sm border border-slate-100 no-pdf">
            <div class="flex items-center gap-4">
                <span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-extrabold uppercase tracking-widest">8A-AMBAR-2026</span>
                <span class="text-slate-300 text-[10px] font-bold uppercase tracking-wider">Dashboard Técnico</span>
            </div>
            <div class="flex gap-4 items-center overflow-x-auto hide-scrollbar">
                <div class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-red-500"></div> Humanidades
                </div>
                <div class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div> Exactas
                </div>
                <div class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div> Ciencias
                </div>
                <div class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-orange-500"></div> Artes
                </div>
                <div class="flex items-center gap-2 text-[9px] font-black text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-purple-500"></div> Deporte
                </div>
            </div>
        </div>

        <!-- Tarjetas de Estado -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="dash-card p-6 flex items-center justify-between relative overflow-hidden group">
                <div class="flex items-center gap-5 z-10">
                    <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black tracking-tighter">8° Ambar</h2>
                        <p id="header-date" class="text-indigo-600 text-[10px] font-black uppercase tracking-widest mt-1">Cargando...</p>
                    </div>
                </div>
                <button onclick="downloadPDF()" class="no-pdf w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center hover:bg-black transition-colors z-10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2.5"></path></svg>
                </button>
            </div>

            <div class="dash-card p-6 flex items-center justify-between">
                <div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Cierre de Bloque</span>
                    <span id="time-left" class="text-4xl font-black tabular-nums tracking-tighter">--:--</span>
                    <div class="flex items-center gap-2 mt-2">
                        <span id="current-time-label" class="text-xs font-bold text-indigo-600 tabular-nums">00:00</span>
                        <span id="status-label" class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Sincronizando</span>
                    </div>
                </div>
                <div class="relative w-16 h-16">
                    <svg class="progress-ring" width="64" height="64">
                        <circle class="text-slate-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        <circle id="progress-circle" class="progress-ring__circle text-indigo-500" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                    </svg>
                    <div id="progress-text" class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="dash-card dash-card-dark p-6 flex items-center justify-between">
                <div>
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-1">Próximo Módulo</span>
                    <h2 id="next-subject-name" class="text-2xl font-black tracking-tight truncate w-32 uppercase leading-none">---</h2>
                    <p id="next-subject-time" class="text-[9px] font-bold text-slate-400 uppercase mt-2 tracking-widest">---</p>
                </div>
                <div id="next-subject-icon" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center font-black border border-white/10 uppercase text-xs">--</div>
            </div>
        </div>

        <!-- Grilla de Horario -->
        <div id="pdf-grid" class="bg-white rounded-[2.5rem] p-4 md:p-8 shadow-sm border border-slate-200">
            <div class="hidden md:grid grid-cols-12 gap-4 mb-6 px-4">
                <div class="col-span-1"></div>
                <div class="col-span-11 grid grid-cols-5 gap-4">
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Lunes</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Martes</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Miércoles</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Jueves</div>
                    <div class="text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Viernes</div>
                </div>
            </div>
            <div id="timetable-content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const subjectsData = {
            'LNG': { name: 'Lenguaje y Comunicación', teacher: 'Troncoso', cat: 'cat-humanidades' },
            'JEF': { name: 'Jefatura / Consejo de Curso', teacher: 'Troncoso', cat: 'cat-orientacion' },
            'MTM': { name: 'Educación Matemática', teacher: 'Rocha', cat: 'cat-exactas' },
            'ART': { name: 'Artes Visuales', teacher: 'Bruno', cat: 'cat-artes' },
            'DyS': { name: 'Deporte y Vida Saludable', teacher: 'Ñancul', cat: 'cat-deporte' },
            'HyG': { name: 'Hist. Geografía y Cs. Soc.', teacher: 'Higuera', cat: 'cat-humanidades' },
            'CSN': { name: 'Ciencias Naturales', teacher: 'Sazo/Flores/Contreras', cat: 'cat-ciencias' },
            'EFI': { name: 'Educación Física y Salud', teacher: 'Pérez', cat: 'cat-deporte' },
            'OC': { name: 'Orientación', teacher: 'Avendaño', cat: 'cat-orientacion' },
            'ING': { name: 'Idioma Extranjero: Inglés', teacher: 'Villarreal', cat: 'cat-humanidades' },
            'TAL': { name: 'Taller Pedagógico', teacher: 'Riquelme/Yañez', cat: 'cat-tecnica' },
            'TEC': { name: 'Educación Tecnológica', teacher: 'Vargas', cat: 'cat-tecnica' },
            'MUS': { name: 'Educación Musical', teacher: 'Reyes', cat: 'cat-artes' }
        };

        const schedule = [
            { type: 'period', id: 1, time: ["08:15", "09:00"], data: ["LNG", "HyG", "TAL", "LNG", "ING"] },
            { type: 'period', id: 2, time: ["09:00", "09:45"], data: ["LNG", "HyG", "MTM", "LNG", "ING"] },
            { type: 'break', time: ["09:45", "10:00"], label: "Recreo" },
            { type: 'period', id: 3, time: ["10:00", "10:45"], data: ["JEF", "CSN", "ING", "MTM", "CSN"] },
            { type: 'period', id: 4, time: ["10:45", "11:30"], data: ["JEF", "CSN", "OC", "MTM", "CSN"] },
            { type: 'break', time: ["11:30", "11:45"], label: "Recreo" },
            { type: 'period', id: 5, time: ["11:45", "12:30"], data: ["MTM", "EFI", "CSN", "TAL", "TEC"] },
            { type: 'period', id: 6, time: ["12:30", "13:15"], data: ["ART", "EFI", "CSN", "ART", "MUS"] },
            { type: 'period', id: 7, time: ["13:15", "14:00"], data: ["ALM", "ALM", "ALM", "ALM", "MUS"] },
            { type: 'period', id: 8, time: ["14:00", "14:45"], data: ["DyS", "LNG", "MTM", "HyG", "MUS"] },
            { type: 'period', id: 9, time: ["14:45", "15:30"], data: ["DyS", "LNG", "MTM", "HyG", "-"] },
            { type: 'period', id: 10, time: ["15:30", "16:15"], data: ["-", "OC", "-", "-", "-"] }
        ];

        let lastActiveIdx = -1;

        function render() {
            const container = document.getElementById('timetable-content');
            if(!container) return;
            const now = new Date();
            const curDay = now.getDay();
            const hhmm = now.getHours() * 100 + now.getMinutes();

            container.innerHTML = '';

            schedule.forEach((item) => {
                const sNum = parseInt(item.time[0].replace(':', ''));
                const eNum = parseInt(item.time[1].replace(':', ''));
                const isCurrent = hhmm >= sNum && hhmm < eNum;

                if (item.type === 'break') {
                    const el = document.createElement('div');
                    const isDayActive = isCurrent && curDay >= 1 && curDay <= 5;
                    el.className = `grid grid-cols-12 items-center h-10 bg-slate-50 border-y border-slate-100 rounded-2xl px-4 transition-all ${isDayActive ? 'ring-2 ring-indigo-200 bg-indigo-50' : ''}`;
                    el.innerHTML = `
                        <div class="col-span-1 text-[8px] font-black text-slate-300 tabular-nums">${item.time[0]}</div>
                        <div class="col-span-11 text-center text-[10px] font-black uppercase tracking-[0.5em] text-slate-400">${item.label}</div>
                    `;
                    container.appendChild(el);
                    return;
                }

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-4 h-24 items-stretch';

                const timeCol = document.createElement('div');
                timeCol.className = 'col-span-1 flex flex-col justify-center text-right pr-4 border-r border-slate-100';
                timeCol.innerHTML = `
                    <span class="text-[8px] font-black text-slate-300 mb-1 uppercase tracking-tighter">B-${item.id}</span>
                    <span class="text-base font-black text-slate-900 leading-none tabular-nums ${isCurrent ? 'text-indigo-600' : ''}">${item.time[0]}</span>
                    <span class="text-[9px] font-bold text-slate-200 mt-1">${item.time[1]}</span>
                `;
                row.appendChild(timeCol);

                const grid = document.createElement('div');
                grid.className = 'col-span-11 grid grid-cols-5 gap-4';

                item.data.forEach((code, cIdx) => {
                    const isToday = (cIdx + 1) === curDay;
                    const isActive = isToday && isCurrent;
                    const block = document.createElement('div');

                    if (code === "-") {
                        block.className = 'bg-slate-50/50 rounded-[2rem] border-2 border-dashed border-slate-100 h-full';
                    } else if (code === "ALM") {
                        block.className = `subject-pill lunch-card flex flex-col items-center justify-center h-full ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `<span class="text-[10px] font-black uppercase tracking-widest">Almuerzo</span>`;
                    } else {
                        const info = subjectsData[code];
                        block.className = `subject-pill ${info.cat} p-4 flex flex-col justify-center items-center text-center h-full ${isActive ? 'active-cell' : ''}`;
                        block.innerHTML = `
                            <div class="custom-tooltip">${info.name}</div>
                            <span class="text-slate-900 font-black text-2xl leading-none tracking-tighter">${code}</span>
                            <span class="text-slate-500 font-bold text-[10px] uppercase truncate w-full mt-1 opacity-60">${info.teacher}</span>
                        `;
                    }
                    
                    if (isActive) {
                        const label = document.createElement('span');
                        label.className = 'active-label';
                        label.textContent = 'ACTUAL';
                        block.appendChild(label);
                    }

                    grid.appendChild(block);
                });
                row.appendChild(grid);
                container.appendChild(row);
            });
        }

        function setProgress(percent) {
            const circle = document.getElementById('progress-circle');
            if(!circle) return;
            const r = circle.r.baseVal.value;
            const circ = r * 2 * Math.PI;
            circle.style.strokeDashoffset = circ - (percent / 100 * circ);
            document.getElementById('progress-text').textContent = Math.round(percent) + '%';
        }

        function update() {
            const now = new Date();
            const day = now.getDay();
            const hhmm = now.getHours() * 100 + now.getMinutes();
            const daysArr = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            
            document.getElementById('header-date').textContent = `${daysArr[day]}, ${now.getDate()} de Abril`;
            document.getElementById('current-time-label').textContent = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });

            let activeIdx = -1;
            let progress = 0;
            let tLeftStr = "--:--";
            let sLabel = "Standby";

            if (day >= 1 && day <= 5) {
                const curBlock = schedule.find((s, idx) => {
                    const start = parseInt(s.time[0].replace(':', ''));
                    const end = parseInt(s.time[1].replace(':', ''));
                    if (hhmm >= start && hhmm < end) {
                        activeIdx = idx;
                        const [sH, sM] = s.time[0].split(':').map(Number);
                        const [eH, eM] = s.time[1].split(':').map(Number);
                        const sT = sH * 60 + sM;
                        const eT = eH * 60 + eM;
                        const nT = now.getHours() * 60 + now.getMinutes();
                        progress = Math.max(0, Math.min(100, ((nT - sT) / (eT - sT)) * 100));
                        const remS = (eT - nT) * 60 - now.getSeconds();
                        tLeftStr = `${Math.floor(remS / 60)}:${(remS % 60).toString().padStart(2, '0')}`;
                        return true;
                    }
                    return false;
                });

                if (curBlock) {
                    sLabel = curBlock.type === 'break' ? "Recreo" : "Módulo";
                    let nIdx = activeIdx + 1;
                    while(nIdx < schedule.length && schedule[nIdx].type === 'break') nIdx++;
                    if(nIdx < schedule.length) {
                        const next = schedule[nIdx];
                        const code = next.data[day-1];
                        if(code && code !== "-") {
                            document.getElementById('next-subject-name').textContent = code;
                            document.getElementById('next-subject-time').textContent = `A las ${next.time[0]}`;
                            document.getElementById('next-subject-icon').textContent = code.substring(0,2);
                        }
                    }
                }
            }

            document.getElementById('time-left').textContent = tLeftStr;
            document.getElementById('status-label').textContent = sLabel;
            setProgress(progress);

            if (activeIdx !== lastActiveIdx) {
                lastActiveIdx = activeIdx;
                render();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-grid');
            const opt = {
                margin: 0.1,
                filename: 'Dashboard_Horario_8A.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        render();
        update();
        setInterval(update, 1000);
        window.addEventListener('resize', render);
    </script>
</body>
</html>
